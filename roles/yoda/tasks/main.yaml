---
# Configure a Yoda (iRODS) durable backend reached via GoCommands (gocmd).
# Runs only when storage_backend == 'yoda' (guarded at the play level). Installs
# the gocmd static binary, writes pipeline_user's iRODS environment, caches an
# auth token from the data-access password, and verifies the collection is
# reachable — so blocked iRODS ports (1247/1248/20000-20199 to {{ yoda_host }})
# or a bad password fail provisioning HERE, not mid-batch. Per ADR 0032 Yoda is
# the seed/sink side only; nothing in this role touches the hot path.

- name: Install gocmd (GoCommands static binary)
  ansible.builtin.unarchive:
    src: "{{ gocmd_url }}"
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"
    owner: root
    group: root
    creates: /usr/local/bin/gocmd
  # Confirmed against v0.12.2: asset is gocmd-<ver>-linux-amd64.tar.gz and the
  # tarball extracts a single top-level `gocmd` (no strip-components needed).

- name: Ensure ~/.irods exists for pipeline_user
  become_user: "{{ pipeline_user }}"
  ansible.builtin.file:
    path: "{{ pipeline_home }}/.irods"
    state: directory
    mode: "0700"

- name: Write iRODS environment for pipeline_user
  become_user: "{{ pipeline_user }}"
  ansible.builtin.template:
    src: irods_environment.json.j2
    dest: "{{ pipeline_home }}/.irods/irods_environment.json"
    mode: "0600"

- name: Cache Yoda auth token from the data-access password
  become_user: "{{ pipeline_user }}"
  ansible.builtin.command: "gocmd init --ttl {{ yoda_auth_ttl_hours }}"
  args:
    creates: "{{ pipeline_home }}/.irods/.irodsA"
  environment:
    # gocmd reads the password from IRODS_USER_PASSWORD (confirmed: the binary
    # embeds envconfig:"IRODS_USER_PASSWORD"); host/zone/user come from
    # irods_environment.json. --ttl sets the PAM token lifetime in hours.
    IRODS_USER_PASSWORD: "{{ yoda_data_access_password }}"
  no_log: true
  # The `creates` sentinel keeps this idempotent; an EXPIRED PAM token will NOT
  # refresh on re-run — size yoda_auth_ttl_hours to your batch length, or re-run
  # `gocmd init` by hand. VERIFY at Tier 3 that Yoda accepts the requested TTL
  # (the server may cap it) and that the env-var auth completes non-interactively.

- name: Verify the Yoda collection is reachable
  become_user: "{{ pipeline_user }}"
  ansible.builtin.command: "gocmd ls {{ yoda_collection }}"
  register: yoda_ls
  changed_when: false
  failed_when: yoda_ls.rc != 0
  # A non-zero rc here almost always means blocked iRODS ports or a bad/expired
  # data-access password; provisioning fails now with the command's stderr.
