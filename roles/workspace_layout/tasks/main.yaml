---
# Lay down the operator-facing run layout (ADR 0032). The transcription hot
# path runs off the boot disk: the whisper model (~/ddp-work/models, created by
# the models role) and transcripts_root (~/ddp-work/transcripts) are local, and
# state.sqlite lives on the boot disk for POSIX fsync (SQLite WAL on the
# NFS-like mount is a corruption hazard). The storage volume is seed + sink: it
# holds inbox (read once at ingest), the durable transcript sink, archive, and
# a state snapshot. run-pipeline*.sh auto-syncs boot disk -> volume after each
# `process` run via sync-to-storage.sh. No systemd: runs are operator-driven.

- name: Create durable directories on the storage volume (seed + sink)
  ansible.builtin.file:
    path: "{{ storage_path }}/{{ item }}"
    state: directory
    owner: "{{ pipeline_user }}"
    group: "{{ pipeline_group }}"
    mode: "0755"
  loop:
    - inbox        # input: DDP JSONs, read once at ingest
    - transcripts  # durable sink: sync-to-storage.sh rsyncs here
    - archive

- name: Create boot-disk transcripts work dir (hot path, off the mount)
  ansible.builtin.file:
    path: "{{ work_dir }}/transcripts"
    state: directory
    owner: "{{ pipeline_user }}"
    group: "{{ pipeline_group }}"
    mode: "0755"

- name: Create native state directory (POSIX fsync for SQLite WAL)
  ansible.builtin.file:
    path: "{{ state_dir }}"
    state: directory
    owner: "{{ pipeline_user }}"
    group: "{{ pipeline_group }}"
    mode: "0755"

- name: Pick the default model for run scripts
  ansible.builtin.set_fact:
    default_model: >-
      {{ 'ggml-large-v3-turbo-q5_0.bin' if model_large_v3_turbo | bool
         else 'ggml-small.bin' if model_small | bool
         else 'ggml-tiny.en.bin' }}
    instance_count: "{{ gpu_count if cuda_build | bool else 1 }}"

- name: Generate per-instance run scripts
  ansible.builtin.template:
    src: run-pipeline.sh.j2
    dest: "{{ pipeline_home }}/run-pipeline{{ ('-gpu' ~ item) if cuda_build | bool else '' }}.sh"
    owner: "{{ pipeline_user }}"
    group: "{{ pipeline_group }}"
    mode: "0755"
  vars:
    instance_id: "{{ item }}"
  loop: "{{ range(instance_count | int) | list }}"

- name: Generate storage sync/restore helpers
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ pipeline_home }}/{{ item }}"
    owner: "{{ pipeline_user }}"
    group: "{{ pipeline_group }}"
    mode: "0755"
  loop:
    - sync-to-storage.sh
    - restore-from-storage.sh
