---
# Download the whisper models the workspace creator selected. Models live
# on the boot disk (~/ddp-work/models) per ADR 0032: loaded once into VRAM
# at startup, so a local read is fast and avoids mmap'ing the model over the
# NFS-like mount. Re-downloaded on each fresh workspace (~1 GB, provision-time).

- name: Ensure models directory on boot disk
  ansible.builtin.file:
    path: "{{ work_dir }}/models"
    state: directory
    owner: "{{ pipeline_user }}"
    group: "{{ pipeline_group }}"
    mode: "0755"

- name: Download selected whisper models
  ansible.builtin.get_url:
    url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/{{ item.file }}"
    dest: "{{ work_dir }}/models/{{ item.file }}"
    owner: "{{ pipeline_user }}"
    group: "{{ pipeline_group }}"
    mode: "0644"
    timeout: 120
  loop:
    - file: ggml-large-v3-turbo-q5_0.bin
      wanted: "{{ model_large_v3_turbo }}"
    - file: ggml-tiny.en.bin
      wanted: "{{ model_tiny_en }}"
    - file: ggml-small.bin
      wanted: "{{ model_small }}"
  when: item.wanted | bool
  register: model_download
  retries: 2
  delay: 10
  until: model_download is succeeded
