---
# Detect GPU/driver state and install the CUDA *toolkit* if (and only if)
# a working driver is present and nvcc is missing. This role never installs
# kernel drivers: a driver install mid-provision can require a reboot, which
# SRC-External cannot survive. The driver is provided by SRC's own **CUDA
# component**, which must precede ddp-transcribe in the catalog item
# (SRC-OS -> SRC-CO -> SRC-External -> CUDA -> ddp-transcribe). The stock
# ubuntu-24.04-rsc image does NOT ship the driver. When SRC's CUDA component
# has run, nvcc is already present and the install tasks below skip.

- name: Detect NVIDIA hardware
  ansible.builtin.shell: lspci | grep -iq nvidia
  register: lspci_nvidia
  failed_when: false
  changed_when: false

- name: Probe NVIDIA driver
  ansible.builtin.command: nvidia-smi -L
  register: nvidia_smi
  failed_when: false
  changed_when: false

- name: Fail if GPU hardware is present but the driver is not
  ansible.builtin.fail:
    msg: >-
      An NVIDIA GPU is visible on the PCI bus but nvidia-smi is absent or
      failing. This playbook deliberately never installs kernel drivers
      (reboot hazard mid-provision). Add SRC's **CUDA** component to the
      catalog item BEFORE ddp-transcribe (SRC-OS -> SRC-CO -> SRC-External ->
      CUDA -> ddp-transcribe); it installs the driver + toolkit. The stock
      ubuntu-24.04-rsc image does not ship the driver. (Set force_cpu_build
      to build a CPU-only binary instead.)
  when: >-
    lspci_nvidia.rc == 0 and nvidia_smi.rc != 0
    and not (force_cpu_build | bool)

- name: Set GPU facts
  ansible.builtin.set_fact:
    gpu_count: "{{ nvidia_smi.stdout_lines | length if nvidia_smi.rc == 0 else 0 }}"
    cuda_build: "{{ nvidia_smi.rc == 0 and not (force_cpu_build | bool) }}"

- name: Check for nvcc
  ansible.builtin.stat:
    path: /usr/local/cuda/bin/nvcc
  register: nvcc_stat

- name: Install NVIDIA CUDA repository keyring
  ansible.builtin.apt:
    deb: "{{ cuda_keyring_url }}"
  when: (cuda_build | bool) and not nvcc_stat.stat.exists

- name: Install pinned CUDA toolkit
  ansible.builtin.apt:
    name: "{{ cuda_toolkit_package }}"
    state: present
    update_cache: true
  when: (cuda_build | bool) and not nvcc_stat.stat.exists

- name: Clean apt cache after CUDA install (15 GB boot disk)
  ansible.builtin.apt:
    clean: true
  when: (cuda_build | bool) and not nvcc_stat.stat.exists
