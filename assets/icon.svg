<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- DDP Transcribe icon. d3i brand palette:
       blue #4272EF (primary), red #FF5E5E (secondary), yellow #FFCF60 (tertiary).
       Play triangle (video) over transcript lines (text). Reads at 32-40px. -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="#4272EF"/>
  <polygon points="78,52 78,124 142,88" fill="#FFFFFF"
           stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round"/>
  <rect x="76" y="152" width="104" height="14" rx="7" fill="#FFCF60"/>
  <rect x="76" y="176" width="84"  height="14" rx="7" fill="#FF5E5E"/>
  <rect x="76" y="200" width="60"  height="14" rx="7" fill="#FFFFFF" opacity="0.9"/>
</svg>
